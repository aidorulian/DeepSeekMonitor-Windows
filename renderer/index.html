<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="panel-body" data-theme="dark">
  <div id="app" class="panel">
    <!-- 头部 (可拖拽区域) -->
    <div class="panel-header drag-region">
      <div class="header-left">
        <div class="brand-icon">
          <img src="../assets/deepseek-icon.png" width="20" height="20" alt="DS" style="border-radius:4px;">
        </div>
        <span class="header-title">DeepSeek Monitor</span>
      </div>
      <div class="header-right no-drag">
        <button id="btnPin" class="icon-btn" title="固定面板" onclick="togglePin()">
          <svg id="pinIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M9.5 1.5L14.5 6.5L12 9L13 14L6.5 10.5L2 15V9.5L6.5 6L2 2L8 3L9.5 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btnRefresh" class="icon-btn" title="刷新" onclick="refresh()">
          <span id="refreshSpinner" class="spinner hidden"></span>
          <svg id="refreshIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8a6 6 0 0 1 10.47-4M14 8a6 6 0 0 1-10.47 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 2v4h-4M2 14v-4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-btn" title="设置" onclick="openSettings()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
            <path d="M13.4 8.6l-.9-.5a5.8 5.8 0 0 0 0-2.2l.9-.5a.5.5 0 0 0 .2-.7l-1-1.7a.5.5 0 0 0-.6-.2l-1 .3a5.7 5.7 0 0 0-1.9-1.1L8.8 1a.5.5 0 0 0-.5-.4H6.7a.5.5 0 0 0-.5.4l-.3 1a5.7 5.7 0 0 0-1.9 1.1l-1-.3a.5.5 0 0 0-.6.2l-1 1.7a.5.5 0 0 0 .2.7l.9.5a5.8 5.8 0 0 0 0 2.2l-.9.5a.5.5 0 0 0-.2.7l1 1.7a.5.5 0 0 0 .6.2l1-.3a5.7 5.7 0 0 0 1.9 1.1l.3 1a.5.5 0 0 0 .5.4h1.8a.5.5 0 0 0 .5-.4l.3-1a5.7 5.7 0 0 0 1.9-1.1l1 .3a.5.5 0 0 0 .6-.2l1-1.7a.5.5 0 0 0-.2-.7Z"/>
          </svg>
        </button>
        <button class="icon-btn" title="关闭" onclick="closePanel()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 未配置 API Key 状态 -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="12" y="16" width="24" height="20" rx="3" stroke="#4D6BFE" stroke-width="2"/>
          <circle cx="24" cy="24" r="4" stroke="#4D6BFE" stroke-width="2"/>
          <path d="M20 24h8" stroke="#4D6BFE" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>需要配置 API Key</h3>
      <p>配置后即可查看余额和最近用量。</p>
      <button class="btn-primary" onclick="openSettings()">打开设置</button>
    </div>

    <!-- API Key 筛选 -->
    <div id="apiFilterBar" class="api-filter-bar hidden">
      <span class="filter-label">API:</span>
      <select id="apiFilterSelect" class="api-filter-select">
        <option value="__all__">全部 API</option>
        <option value="__split__">分API展示</option>
      </select>
    </div>

    <!-- 仪表盘 -->
    <div id="dashboard" class="dashboard hidden">
      <!-- 错误提示 -->
      <div id="errorBanner" class="banner banner-error hidden"></div>

      <!-- 警告提示 -->
      <div id="warningBanner" class="banner banner-warning hidden"></div>

      <!-- 余额卡片 -->
      <div id="balanceCard" class="card balance-card">
        <div class="card-header">
          <span class="card-label">账户余额</span>
          <span id="balanceStatus" class="badge badge-green">可用</span>
        </div>
        <div id="balanceAmount" class="balance-amount">¥0.00</div>
        <div class="balance-details">
          <div class="detail-item">
            <span class="detail-label">今日消耗</span>
            <span id="dayCost" class="detail-value">¥0.00</span>
          </div>
          <div class="detail-divider"></div>
          <div class="detail-item">
            <span class="detail-label">本月消耗</span>
            <span id="monthCost" class="detail-value">¥0.00</span>
          </div>
        </div>
      </div>

      <!-- 用量卡片 -->
      <div class="usage-section">
        <div class="section-label">模型用量（近 7 天）</div>
        <div class="usage-cards">
          <div id="flashCard" class="card usage-card flash-card" onclick="openDetail('flash')">
            <div class="model-indicator flash"></div>
            <div class="model-info">
              <span class="model-name">V4 Flash</span>
              <span id="flashTokens" class="model-tokens">0 Token</span>
            </div>
            <div class="model-cost">
              <span id="flashCost" class="cost-value">¥0.00</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M4 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <div id="proCard" class="card usage-card pro-card" onclick="openDetail('pro')">
            <div class="model-indicator pro"></div>
            <div class="model-info">
              <span class="model-name">V4 Pro</span>
              <span id="proTokens" class="model-tokens">0 Token</span>
            </div>
            <div class="model-cost">
              <span id="proCost" class="cost-value">¥0.00</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M4 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- 趋势图 -->
      <div class="chart-section">
        <div class="section-label">消耗趋势</div>
        <div class="chart-container">
          <canvas id="usageChart"></canvas>
        </div>
      </div>

      <!-- 底部状态栏 -->
      <div class="status-bar">
        <span id="lastUpdated" class="status-text">尚未刷新</span>
      </div>
    </div>
  </div>

  <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="main.js"></script>
</body>
</html>
